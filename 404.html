<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2040%2048'%3E%3Cpath%20d='M8%206%20L20%2038%20L32%206'%20stroke='%23f4f3f4'%20stroke-width='5'%20fill='none'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3Ccircle%20cx='20'%20cy='38'%20r='4'%20fill='%23e63b4e'/%3E%3C/svg%3E">
<meta name="theme-color" content="#090607">
<title>Page Not Found | Vermillion Axis Technologies</title>
<style>
:root{color-scheme:dark;--red:#e63b4e;--bright:#f2f1f2;--dim:#918f93;
--serif:Georgia,'Times New Roman',serif;--sans:system-ui,-apple-system,'Segoe UI',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:clip}
body{background:#090607;color:#c9c8ca;font-family:var(--sans);min-height:100vh;min-height:100svh;
display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;overflow-x:hidden}
::selection{background:var(--red);color:#fff}
.halo{position:fixed;top:calc(50% - 330px);left:50%;transform:translateX(-50%);width:470px;height:470px;
border-radius:50%;background:radial-gradient(circle,rgba(228,48,72,.4),rgba(195,25,52,.12) 42%,transparent 62%);pointer-events:none}
main{position:relative;max-width:560px}
svg.arch{width:150px;margin:0 auto 8px;display:block}
.code{font-family:var(--serif);font-size:clamp(72px,16vw,120px);line-height:1;font-weight:600;letter-spacing:.04em;
background:linear-gradient(180deg,#ffffff 15%,#96959b 95%);-webkit-background-clip:text;background-clip:text;color:transparent}
h1{font-family:var(--serif);font-variant:small-caps;letter-spacing:.14em;font-weight:600;color:var(--bright);
font-size:clamp(22px,5vw,30px);margin:14px 0 10px}
p{color:var(--dim);font-size:17px;line-height:1.65;margin-bottom:32px}
.orn{display:flex;align-items:center;justify-content:center;margin:26px 0;opacity:.9}
.orn::before,.orn::after{content:"";height:1px;width:min(26vw,160px);background:linear-gradient(90deg,transparent,rgba(230,59,78,.55))}
.orn::after{background:linear-gradient(90deg,rgba(230,59,78,.55),transparent)}
.orn i{width:11px;height:11px;border:1px solid var(--red);transform:rotate(45deg);margin:0 14px;position:relative}
.orn i::after{content:"";position:absolute;inset:3px;background:var(--red)}
a.btn{display:inline-block;font-family:var(--serif);font-variant:small-caps;letter-spacing:.22em;font-size:16px;
padding:15px 34px;border-radius:10px;color:#fff;text-decoration:none;
background:linear-gradient(105deg,#e52f48 0%,#ec3b50 55%,#f25066 100%);
box-shadow:0 12px 44px rgba(230,59,78,.4),inset 0 1px 0 rgba(255,255,255,.28);transition:.3s}
a.btn:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 14px 56px rgba(230,59,78,.55),inset 0 1px 0 rgba(255,255,255,.3)}
a.plain{display:block;margin-top:22px;color:var(--dim);font-size:15px;text-decoration:none}
a.plain:hover{color:var(--red)}
a:focus-visible{outline:2px solid var(--red);outline-offset:3px;border-radius:4px}
</style>
</head>
<body>
<div class="halo" aria-hidden="true"></div>
<main>
  <svg class="arch" viewBox="0 0 220 210" aria-hidden="true">
    <defs><radialGradient id="glow" cx="50%" cy="72%" r="36%"><stop offset="0%" stop-color="rgba(240,80,100,.55)"/><stop offset="55%" stop-color="rgba(210,35,60,.22)"/><stop offset="100%" stop-color="rgba(210,35,60,0)"/></radialGradient></defs>
    <rect width="220" height="210" fill="url(#glow)"/>
    <path d="M55 205 V85 Q55 22 110 22 Q165 22 165 85 V205" stroke="#d9d8da" stroke-width="2" fill="none" opacity=".92"/>
    <path d="M84 46 L110 152 L136 46" stroke="#f5f4f5" stroke-width="4" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="110" y1="0" x2="110" y2="152" stroke="#e63b4e" stroke-width="1" opacity=".85"/>
    <circle cx="110" cy="22" r="2.6" fill="#f55f72"/>
    <circle cx="110" cy="152" r="5" fill="#f55f72"/>
    <circle cx="110" cy="152" r="12" fill="rgba(230,59,78,.35)"/>
  </svg>
  <div class="code">404</div>
  <h1>Off the Axis</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back to solid ground.</p>
  <div class="orn" aria-hidden="true"><i></i></div>
  <a class="btn" href="/">Return Home</a>
  <a class="plain" href="mailto:contact@vermillionaxis.tech">contact@vermillionaxis.tech</a>
</main>
</body>
</html>
