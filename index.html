<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vermillion Axis Technologies</title>
  <meta name="description" content="Vermillion Axis Technologies — site is being rebuilt. Redirecting to our GitHub." />

  <!-- Primary redirect: send visitors to the GitHub repository -->
  <meta http-equiv="refresh" content="0; url=https://github.com/v3vermillion/axistechnologies" />
  <link rel="canonical" href="https://github.com/v3vermillion/axistechnologies" />

  <style>
    :root {
      --bg: #0d0f14;
      --fg: #f4f5f7;
      --muted: #9aa2b1;
      --accent: #e34234; /* vermillion */
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: radial-gradient(1200px 600px at 50% -10%, #1a1d26 0%, var(--bg) 60%);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 560px;
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(227, 66, 52, 0.4);
      border-radius: 999px;
      padding: 6px 14px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      margin: 0 0 12px;
      line-height: 1.15;
    }
    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
      margin: 0 0 28px;
    }
    a.cta {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 10px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    a.cta:hover { transform: translateY(-1px); opacity: 0.92; }
    .fallback {
      margin-top: 20px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .fallback a { color: var(--fg); }
  </style>

  <!-- JS fallback in case meta refresh is blocked -->
  <script>
    window.location.replace("https://github.com/v3vermillion/axistechnologies");
  </script>
</head>
<body>
  <main class="card">
    <span class="badge">Site rebuilding</span>
    <h1>Vermillion Axis Technologies</h1>
    <p>
      We're rebuilding <strong>vermillionaxis.tech</strong>. In the meantime,
      you'll find us on GitHub. Redirecting you now&hellip;
    </p>
    <a class="cta" href="https://github.com/v3vermillion/axistechnologies">
      Continue to GitHub &rarr;
    </a>
    <p class="fallback">
      Not redirected automatically?
      <a href="https://github.com/v3vermillion/axistechnologies">Click here</a>.
    </p>
  </main>
</body>
</html>
